<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariappa</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <link rel="stylesheet" href="/shared/platformer.css">
</head>
<body style="background:#3a8fbf;">

  <a href="/" class="back-to-hub">←&nbsp;Hub</a>

  <div class="game-shell">
    <div class="hud">
      <div class="hud-block">
        <span class="hud-label">MARIAPPA</span>
        <span class="hud-value" style="color:#ffd166;">L1</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">RUPEES</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">LIVES</span>
        <span class="hearts" id="hud-lives">❤❤❤</span>
      </div>
    </div>

    <canvas id="canvas" width="900" height="520"></canvas>

    <div class="touch-controls" id="touch-controls">
      <div class="pad">
        <button class="touch-btn" data-touch="left">◀</button>
        <button class="touch-btn" data-touch="right">▶</button>
      </div>
      <div class="pad">
        <button class="touch-btn" data-touch="jump">▲</button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden" style="color:#ffd166;">
    <div class="endcard">
      <h2 id="end-title">Level Complete!</h2>
      <p id="end-msg">You hoisted the flag.</p>
      <div class="score-line">Score: <b id="end-score">0</b></div>
      <button id="play-again"><span>Play Again</span></button>
      <a href="/">Hub</a>
    </div>
  </div>

  <script src="/shared/profile.js"></script>
  <script src="/shared/platformer.js"></script>
  <script src="game.js"></script>
</body>
</html>
